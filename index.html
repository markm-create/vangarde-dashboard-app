
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <title>Vangarde Performance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              inter: ['Inter', 'sans-serif'],
            },
            colors: {
              app: 'var(--bg-app)',
              card: 'var(--bg-card)',
              'text-main': 'var(--text-main)',
              'text-muted': 'var(--text-muted)',
              'border-subtle': 'var(--border-subtle)',
              'surface-100': 'var(--surface-100)',
              'surface-50': 'var(--surface-50)',
            },
            keyframes: {
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              }
            },
            animation: {
              shimmer: 'shimmer 2s infinite',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-app: #f8fafc;
        --bg-card: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border-subtle: #f1f5f9;
        --surface-100: #f8fafc;
        --surface-50: #ffffff;
        --card-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      }

      .dark {
        --bg-app: #0f172a;
        --bg-card: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-subtle: rgba(255, 255, 255, 0.05);
        --surface-100: #1e293b;
        --surface-50: #0f172a;
        --card-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.5);
      }

      body {
        font-family: 'Outfit', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: var(--bg-app);
        color: var(--text-main);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      .scrollbar-none::-webkit-scrollbar { display: none; }
      .scrollbar-thin::-webkit-scrollbar { width: 4px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
      .dark .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; }

      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .animate-shimmer {
        animation: shimmer 2s infinite;
      }

      .shadow-glow {
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
